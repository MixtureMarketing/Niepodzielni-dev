services:

  # ── nginx — reverse proxy + FastCGI cache + static files ────────────────────
  # Identyczny stack jak Trellis na VPS.
  # FastCGI cache: BYPASS dla wp-admin, POST, query string, zalogowanych.
  nginx:
    image: nginx:1.26-alpine
    container_name: niepodzielni-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      # Kod źródłowy (read-only — nginx tylko serwuje statyczne pliki)
      - .:/var/www/html:ro
      - vendor_root:/var/www/html/vendor:ro
      - vendor_theme:/var/www/html/web/app/themes/niepodzielni-theme/vendor:ro
      - webwp:/var/www/html/web/wp:ro
      - plugins:/var/www/html/web/app/plugins:ro
      - acorn_cache:/var/www/html/web/app/cache:ro
      # nginx config
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/fastcgi_cache.conf:/etc/nginx/conf.d/00-fastcgi-cache.conf:ro
      # Cache FastCGI (własny volume — nie traci się przy rebuild)
      - nginx_cache:/var/cache/nginx
    depends_on:
      php:
        condition: service_started

  # ── PHP-FPM — dynamiczne requesty WordPress ──────────────────────────────────
  php:
    build: .
    container_name: niepodzielni-php
    restart: unless-stopped
    # Brak ports: — PHP-FPM słucha tylko wewnątrz sieci Dockera na :9000
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      DISABLE_WP_CRON: "true"
    volumes:
      - .:/var/www/html
      - ./docker/web.htaccess:/var/www/html/web/.htaccess
      - vendor_root:/var/www/html/vendor
      - vendor_theme:/var/www/html/web/app/themes/niepodzielni-theme/vendor
      - webwp:/var/www/html/web/wp
      - plugins:/var/www/html/web/app/plugins
      - acorn_cache:/var/www/html/web/app/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /entrypoint.sh

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: niepodzielni-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: bedrock_niepodzielni
      MYSQL_USER: niepodzielni
      MYSQL_PASSWORD: niepodzielni_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database-template.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
      - ./docker/db-init/02-update-urls.sql:/docker-entrypoint-initdb.d/02-update-urls.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  # allkeys-lru + bez persystencji = czysty cache (identycznie jak na VPS)
  redis:
    image: redis:7-alpine
    container_name: niepodzielni-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── phpMyAdmin (dev only) ────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: niepodzielni-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: niepodzielni
      PMA_PASSWORD: niepodzielni_pass
    depends_on:
      - db

volumes:
  db_data:
  vendor_root:
  vendor_theme:
  webwp:
  plugins:
  acorn_cache:
  nginx_cache:
