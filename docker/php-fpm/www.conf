[www]
user  = www-data
group = www-data

; TCP (nginx i PHP-FPM w osobnych kontenerach → sieć Docker)
; Na VPS (Trellis) Trellis używa unix socketu — /run/php/phpX.Y-fpm.sock
listen = 9000

; Dynamic pool — identyczne wartości jak domyślny Trellis starter
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.process_idle_timeout = 10s

; Recykling workerów — zapobiega wyciekowaniu pamięci przez pluginy WP
pm.max_requests = 500

; Przechwytuj stderr PHP do logów nginx/docker (docker logs niepodzielni-php)
php_admin_flag[log_errors] = On
catch_workers_output = yes
decorate_workers_output = no
