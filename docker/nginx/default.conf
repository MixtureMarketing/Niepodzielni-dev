server {
    listen 80;
    server_name localhost;

    root /var/www/html/web;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    # Docker embedded DNS — rozwiązuje nazwy serwisów Compose w czasie requestu
    # (nie przy starcie nginx, co powoduje "host not found" gdy php jeszcze nie gotowy)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── FastCGI cache bypass logic ──────────────────────────────────────────────
    # Pomija cache dla POST, query string, wp-admin, zalogowanych użytkowników.
    # Identyczne warunki jak na VPS (Trellis).
    set $skip_cache 0;
    if ($request_method = POST)                                   { set $skip_cache 1; }
    if ($query_string != "")                                      { set $skip_cache 1; }
    if ($request_uri ~* "/wp-admin/|/wp/wp-admin/|/wp-login|/wp/wp-login|/xmlrpc") {
        set $skip_cache 1;
    }
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
        set $skip_cache 1;
    }

    # ── Uploads: lokalnie lub proxy do produkcji ────────────────────────────────
    # Pliki z uploads/ nie są w repo — jeśli brak lokalnie, nginx pobiera z prod.
    location ^~ /app/uploads/ {
        try_files $uri @uploads_prod;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location @uploads_prod {
        proxy_pass         https://niepodzielni.pl;
        proxy_set_header   Host niepodzielni.pl;
        proxy_ssl_server_name on;
        # Mapuj /app/uploads/ z powrotem na /wp-content/uploads/ (ścieżka na prod)
        rewrite ^/app/uploads/(.*)$ /wp-content/uploads/$1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Statyczne assety — długi cache, bez PHP ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
    }

    # ── Bedrock: /wp-content/ → /app/ (Vite buduje z base=/wp-content/themes/…) ─
    # Vite bake'uje absolutne ścieżki /wp-content/themes/… w CSS (fonty, obrazki).
    # W Bedrock content dir to /app/, więc lokalnie nginx musi przepisać ścieżkę.
    location ^~ /wp-content/ {
        rewrite ^/wp-content/(.*)$ /app/$1 last;
    }

    # ── Carbon Fields assets ────────────────────────────────────────────────────
    location ^~ /carbon-fields/ {
        try_files $uri $uri/ =404;
        access_log off;
    }

    # ── Bedrock: /wp/wp-admin bez trailing slash → redirect ────────────────────
    location = /wp/wp-admin {
        return 301 /wp/wp-admin/;
    }

    # ── Bedrock: convenience rewrites (lh.pl / Trellis robi to samo) ───────────
    location ^~ /wp-admin {
        rewrite ^/wp-admin(/.*)?$ /wp/wp-admin$1 last;
    }
    location ^~ /wp-includes/ {
        rewrite ^/wp-includes/(.*)$ /wp/wp-includes/$1 last;
    }
    location = /wp-login.php  { rewrite ^ /wp/wp-login.php  last; }
    location = /wp-cron.php   { rewrite ^ /wp/wp-cron.php   last; }
    location = /xmlrpc.php    { rewrite ^ /wp/xmlrpc.php    last; }

    # ── Blokuj ukryte pliki (.git, .env itp.) ───────────────────────────────────
    location ~ /\. {
        deny all;
        log_not_found off;
    }

    # ── WordPress front controller ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;

        # Zmienna + resolver 127.0.0.11 = lazy DNS (rozwiązuje przy requeście, nie starcie)
        set $php_upstream php:9000;
        fastcgi_pass             $php_upstream;
        fastcgi_index            index.php;
        fastcgi_buffers          8 16k;
        fastcgi_buffer_size      32k;
        fastcgi_read_timeout     300s;

        include                  fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $document_root;
        fastcgi_param SERVER_NAME     $host;

        # FastCGI cache
        fastcgi_cache            WORDPRESS;
        fastcgi_cache_valid       200 301 302 60m;
        fastcgi_cache_use_stale  error timeout invalid_header updating http_500;
        fastcgi_cache_bypass     $skip_cache;
        fastcgi_no_cache         $skip_cache;

        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
