; WordPress PHP settings — środowisko developerskie
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 512M
max_execution_time = 120
max_input_vars = 3000
date.timezone = Europe/Warsaw

; Realpath cache — Bedrock + vendor + theme = głębokie ścieżki, domyślne 256K za mało.
; A6: realpath_cache_size + realpath_cache_ttl — redukcja stat() per request.
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; OPcache — włączone z rewalidacją przy każdym requeście (pełna szybkość + widoczne zmiany)
; A6: memory_consumption 128→256 (pokrywa cały Bedrock+vendor+theme bez eviction)
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; Pokaż błędy PHP w trybie development.
; E_DEPRECATED wykluczone — PHP 8.4 generuje setki ostrzeżeń z bundled AWS SDK
; w media-cloud-sync (zewnętrzny vendor, nie nasz kod).
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED
