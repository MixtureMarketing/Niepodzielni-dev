# Deploy gałęzi `dev` na ten sam VPS co produkcja (185.201.113.217), ale jako
# osobny vhost: dev.niepodzielni.com z osobną bazą i wyłączonym FastCGI cache.
# Trellis multi-site obsługuje to natywnie — drugi klucz `dev.niepodzielni.com`
# w trellis/group_vars/production/wordpress_sites.yml wskazuje branch: dev.
#
# Worker ai-agent dostaje osobną nazwę (niepodzielni-ai-agent-staging) żeby nie
# zakłócać workera produkcyjnego.

name: Deploy to dev (staging vhost)

on:
  push:
    branches: [dev]

# Default permissions: read-only code clone. SSH/wrangler/ansible używają
# własnych sekretów (DEPLOY_SSH_KEY, CLOUDFLARE_API_TOKEN, ANSIBLE_VAULT_PASS).
permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy (dev.niepodzielni.com)
    runs-on: ubuntu-24.04
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/app/themes/niepodzielni-theme/package-lock.json

      - name: Install npm dependencies
        working-directory: web/app/themes/niepodzielni-theme
        run: npm ci

      - name: Build theme assets
        working-directory: web/app/themes/niepodzielni-theme
        run: npm run build

      # SSH klucz przez ssh-agent — nigdy nie ląduje na dysku.
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust dev VPS host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 185.201.113.217 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload built assets to dev shared dir
        run: |
          ssh root@185.201.113.217 "mkdir -p /srv/www/dev.niepodzielni.com/shared/theme-build"
          rsync -az --delete \
            web/app/themes/niepodzielni-theme/public/build/ \
            root@185.201.113.217:/srv/www/dev.niepodzielni.com/shared/theme-build/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Ansible
        run: pip install 'ansible>=2.10.0'

      - name: Install Ansible Galaxy roles
        working-directory: trellis
        run: ansible-galaxy install -r galaxy.yml -p vendor/roles --force

      # env=production bo VPS jest produkcyjny — Trellis wybiera site po kluczu
      # w wordpress_sites.yml (dev.niepodzielni.com tam jest dorzucony obok prod).
      # Vault password przez `--vault-password-file <(...)` — nie zapisuje na dysk.
      - name: Deploy
        working-directory: trellis
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASS }}
        run: |
          ansible-playbook deploy.yml \
            -e env=production \
            -e site=dev.niepodzielni.com \
            --vault-password-file <(printf '%s' "$ANSIBLE_VAULT_PASSWORD")

  worker-deploy:
    name: Deploy Cloudflare Worker (staging)
    needs: deploy
    runs-on: ubuntu-24.04
    environment: staging

    defaults:
      run:
        working-directory: workers/ai-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workers/ai-agent/package-lock.json

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      # PR #7 dodał sekcje [env.staging] do wrangler.toml — używamy --env staging
      # zamiast --name override. Worker name z wrangler.toml: niepodzielni-ai-agent-staging.
      - name: Wrangler deploy (staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
