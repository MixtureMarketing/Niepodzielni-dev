# ──────────────────────────────────────────────────────────────────────────────
# Niepodzielni CI/CD Pipeline
#
# Graf zależności (wszystkie ścieżki równoległe tam gdzie to możliwe):
#
#   static-analysis ──┐
#   backend-tests   ──┤
#   frontend-build  ──┼──► deploy  (tylko push do main)
#   frontend-unit   ──┤
#   e2e-tests       ──┘  (warunkowo: push + PLAYWRIGHT_BASE_URL skonfigurowany)
#
# Caching:
#   Composer  — actions/cache@v4 z kluczem po composer.lock (~60 s oszczędności)
#   npm       — actions/setup-node@v4 z cache:'npm'       (~30 s oszczędności)
#   Playwright— actions/cache@v4 ~250 MB binarek           (~90 s oszczędności)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Anuluje poprzedni run dla tej samej gałęzi/PR gdy nowy commit trafi zanim
# poprzedni się zakończy — oszczędza minuty runner-ów na niepotrzebnych runach.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 1 — Static Analysis: Pint + PHPStan                                │
  # │  Brak macierzy PHP — narzędzia analizy nie testują kompatybilności       │
  # │  z wersjami. Jedna instancja runner-a wystarczy; działa równolegle        │
  # │  z backend-tests i frontend-*.                                           │
  # └──────────────────────────────────────────────────────────────────────────┘
  static-analysis:
    name: "Static Analysis (Pint + PHPStan)"
    runs-on: ubuntu-24.04

    env:
      COMPOSER_CACHE_DIR: ~/.cache/composer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, fileinfo, curl, intl, json, zip
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cache kluczowany po composer.lock — inwalidacja tylko przy zmianie zależności.
      # restore-keys: fallback gdy nie ma dokładnego hitu (np. nowa gałąź).
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-8.4-
            composer-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Pint — styl kodu (--test)"
        run: vendor/bin/pint --test

      - name: "PHPStan — analiza statyczna (level 8)"
        run: vendor/bin/phpstan analyse --no-progress

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 2 — Backend Tests: Pest                                             │
  # │  Osobny job od static-analysis — oba startują równocześnie.             │
  # │  Macierz PHP testuje kompatybilność z >=8.3 (per composer.json).        │
  # └──────────────────────────────────────────────────────────────────────────┘
  backend-tests:
    name: "Pest (PHP ${{ matrix.php-version }})"
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.4"   # Wersja produkcyjna
          - "8.3"   # Minimalna wersja wg composer.json: >=8.3

    env:
      COMPOSER_CACHE_DIR: ~/.cache/composer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, fileinfo, curl, intl, json, zip, bcmath
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php-version }}-
            composer-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Pest — testy jednostkowe"
        run: vendor/bin/pest

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 3 — Frontend Build: Vite                                           │
  # │  Buduje assety produkcyjne i uploaduje je jako artefakt CI.              │
  # │  Artefakt może być pobrany przez job deploy (zamiast budować drugi raz). │
  # └──────────────────────────────────────────────────────────────────────────┘
  frontend-build:
    name: "Frontend — Vite build"
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: web/app/themes/niepodzielni-theme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cache: 'npm' w setup-node korzysta z package-lock.json jako klucza.
      # Inwalidacja tylko przy zmianie zależności — pierwsze ~30 s oszczędności.
      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/app/themes/niepodzielni-theme/package-lock.json

      # npm ci jest deterministyczne i szybsze niż npm install w CI.
      - name: npm ci
        run: npm ci

      - name: "Vite build (production)"
        run: npm run build

      # Upload artefaktu: deploy job pobiera go zamiast budować po raz drugi.
      # retention-days: 1 minimalizuje zużycie storage na GitHub.
      - name: Upload artefaktu public/build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: web/app/themes/niepodzielni-theme/public/build
          retention-days: 1
          if-no-files-found: error

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 4 — Frontend Unit Tests: Vitest                                    │
  # │  Niezależny od frontend-build — Vitest nie potrzebuje zbudowanych        │
  # │  assetów, więc może startować równocześnie z innymi jobami.              │
  # └──────────────────────────────────────────────────────────────────────────┘
  frontend-unit:
    name: "Frontend — Vitest"
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: web/app/themes/niepodzielni-theme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/app/themes/niepodzielni-theme/package-lock.json

      - name: npm ci
        run: npm ci

      # npm run test → vitest run (bez --watch, tryb CI)
      - name: "Vitest — testy jednostkowe JS"
        run: npm run test

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 5 — E2E Tests: Playwright                                          │
  # │                                                                          │
  # │  Warunek uruchomienia: PLAYWRIGHT_BASE_URL ustawiony jako GitHub         │
  # │  Variable (Settings → Secrets and variables → Variables).               │
  # │  Przykład: https://staging.niepodzielni.pl                              │
  # │                                                                          │
  # │  Testy mockują wszystkie wywołania AJAX (page.route) i uruchamiają się  │
  # │  przeciwko skonfigurowanemu środowisku WP. Bez tego adresu job jest      │
  # │  pomijany — nie blokuje pipeline'u.                                      │
  # │                                                                          │
  # │  Cache przeglądarek (~250 MB): klucz po package-lock.json. Pełny        │
  # │  download (chromium+firefox) tylko przy zmianie Playwright lub          │
  # │  package-lock — w kolejnych runach ~90 s oszczędności.                  │
  # └──────────────────────────────────────────────────────────────────────────┘
  e2e-tests:
    name: "E2E — Playwright (Chromium + Firefox)"
    runs-on: ubuntu-24.04

    # Uruchamia się tylko przy push (nie PR) i tylko gdy staging URL jest skonfigurowany.
    # Przy PR pomijamy E2E — wystarczą unit testy; staging testujemy po merge.
    if: >
      github.event_name == 'push' &&
      vars.PLAYWRIGHT_BASE_URL != ''

    defaults:
      run:
        working-directory: web/app/themes/niepodzielni-theme

    env:
      # Podaj adres staging w GitHub Variables: PLAYWRIGHT_BASE_URL
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      # Stała ścieżka cache — nie zależy od wersji Playwright w binarce
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/app/themes/niepodzielni-theme/package-lock.json

      - name: npm ci
        run: npm ci

      # Cache binarek przeglądarek: Chromium (~170 MB) + Firefox (~80 MB).
      # Klucz inwalidowany tylko przy zmianie package-lock.json (nowa wersja @playwright/test).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # Gdy cache miss: pobierz binarski chromium + firefox + system deps (~2 min)
      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      # Gdy cache hit: binaries z cache, ale system deps (apt) trzeba doinstaować (~15 s)
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - name: "Playwright E2E tests"
        run: npm run test:e2e

      # Uploaduj raporty tylko przy niepowodzeniu — pomaga debugować bez zaśmiecania UI.
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: web/app/themes/niepodzielni-theme/playwright-report/
          retention-days: 7

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 6 — Deploy do lh.pl (rsync + SSH)                                 │
  # │                                                                          │
  # │  Secrets (GitHub → Settings → Secrets → Actions):                       │
  # │    PROD_SSH_PRIVATE_KEY  — klucz ed25519 (deploy_key)                  │
  # │    PROD_ENV              — zawartość pliku .env (cały plik, nie base64) │
  # │                                                                          │
  # │  Specyfika lh.pl (open_basedir = web/ only):                            │
  # │    vendor/ i config/ muszą być WEWNĄTRZ web/ — przed rsync przenosimy  │
  # │    je tam i łatamy web/wp-config.php (dirname→__DIR__).                 │
  # └──────────────────────────────────────────────────────────────────────────┘
  deploy:
    name: "Deploy — Production (lh.pl)"
    runs-on: ubuntu-24.04
    needs: [static-analysis, backend-tests, frontend-build, frontend-unit]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://niepodzielni-dev-01.mixturemarketing.pl

    env:
      COMPOSER_CACHE_DIR: ~/.cache/composer
      DEPLOY_HOST: serwer322648.lh.pl
      DEPLOY_PORT: "40022"
      DEPLOY_USER: serwer322648
      DEPLOY_PATH: public_html/niepodzielni-dev-01.mixturemarketing.pl/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Pobierz artefakt frontendu (zbudowany w frontend-build) ─────────────
      - name: Download artefaktu public/build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: web/app/themes/niepodzielni-theme/public/build

      # ── PHP + Composer (prod deps only) ─────────────────────────────────────
      - name: PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, fileinfo, curl, intl, json, zip
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-deploy-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-deploy-8.4-
            composer-8.4-

      - name: Composer install (--no-dev)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Composer install theme (--no-dev)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction
        working-directory: web/app/themes/niepodzielni-theme

      # ── Przygotowanie struktury dla lh.pl (open_basedir = web/) ─────────────
      # lh.pl blokuje dostęp PHP do katalogów powyżej web/. Przenosimy vendor/
      # i config/ do web/ i łatamy trzy rzeczy:
      #   1. wp-config.php — dirname(__DIR__) → __DIR__
      #   2. Composer autoloader — ścieżki PSR-4 vendor/../web/app/ → vendor/../app/
      #      (autoloader generowany z projektu root ma prefix /web/ który staje się
      #       nadmiarowy gdy vendor/ jest już wewnątrz web/)
      - name: Restructure for lh.pl (vendor+config inside web/)
        run: |
          cp -r vendor/ web/vendor/
          cp -r config/ web/config/

          # 1. wp-config.php
          sed -i \
            "s|require_once dirname(__DIR__) . '/vendor/autoload.php'|require_once __DIR__ . '/vendor/autoload.php'|" \
            web/wp-config.php
          sed -i \
            "s|require_once dirname(__DIR__) . '/config/application.php'|require_once __DIR__ . '/config/application.php'|" \
            web/wp-config.php

          # 2. Composer autoloader path fix (project-root paths → web-root paths)
          for f in web/vendor/composer/autoload_psr4.php \
                   web/vendor/composer/autoload_classmap.php; do
            sed -i "s|\\\$baseDir . '/web/app/|\$baseDir . '/app/|g" "$f"
          done
          sed -i "s|'/../..' . '/web/app/|'/../..' . '/app/|g" \
            web/vendor/composer/autoload_static.php
          sed -i "s|'\/..\/..\/web\/app\/|'/../../app/|g" \
            web/vendor/composer/installed.php

      - name: Write .env
        run: echo "${{ secrets.PROD_ENV }}" > web/.env

      # ── SSH known_hosts ──────────────────────────────────────────────────────
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "[serwer322648.lh.pl]:40022 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKyBEKAMS05prsIbz7kaH2tYwFZ8SPNYUfRphHD0S4hd" \
            >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Setup SSH private key
        run: |
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # ── rsync ────────────────────────────────────────────────────────────────
      # --delete usuwa pliki na serwerze których nie ma lokalnie (poza exclusions).
      # wp/ — WordPress core zarządzany ręcznie (duży, rzadko się zmienia).
      # app/uploads/ — pliki użytkowników, nigdy nie nadpisujemy.
      # app/cache/ — cache runtime, nie deploy.
      # .env — piszemy osobno z secrets (nie z git).
      # np-*.php — diagnostyczne/jednorazowe, czyścimy ręcznie.
      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=yes" \
            --exclude='.env' \
            --exclude='wp/' \
            --exclude='app/uploads/' \
            --exclude='app/cache/' \
            --exclude='np-*.php' \
            web/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/${{ env.DEPLOY_PATH }}/

      # ── Post-deploy: przepłucz permalink cache ───────────────────────────────
      - name: Post-deploy (flush rewrite + opcache)
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ env.DEPLOY_PORT }} \
            -o StrictHostKeyChecking=yes \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "/usr/bin/php84 /usr/bin/wp \
              --path=\$HOME/${{ env.DEPLOY_PATH }}/wp \
              rewrite flush --hard 2>&1 || true"
