      #   run: |
      #     rsync -azP --delete \
      #       --exclude='.git/' --exclude='.github/' \
      #       --exclude='node_modules/' \
      #       --exclude='web/app/themes/niepodzielni-theme/node_modules/' \
      #       --exclude='.env' --exclude='web/wp/' \
      #       ./ ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_SSH_PATH }}
      #
      # - name: Post-deploy (composer install + cache flush)
      #   run: |
      #     ssh ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
      #       "cd ${{ secrets.PROD_SSH_PATH }} && \
      #        composer install --no-dev --optimize-autoloader --no-interaction && \
