# ──────────────────────────────────────────────────────────────────────────────
# Niepodzielni CI Pipeline
#
# Deploy produkcyjny (VPS) obsługuje osobny workflow: deploy.yml (Trellis/Ansible)
#
# Graf zależności (wszystkie ścieżki równoległe):
#
#   static-analysis ─┐
#   backend-tests   ─┤
#   frontend-build  ─┤  (CI only — deploy w deploy.yml)
#   frontend-unit   ─┤
#   e2e-tests       ─┘  (warunkowo: push + PLAYWRIGHT_BASE_URL skonfigurowany)
#
# Caching:
#   Composer  — actions/cache@v4 z kluczem po composer.lock (~60 s oszczędności)
#   npm       — actions/setup-node@v4 z cache:'npm'       (~30 s oszczędności)
#   Playwright— actions/cache@v4 ~250 MB binarek           (~90 s oszczędności)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Anuluje poprzedni run dla tej samej gałęzi/PR gdy nowy commit trafi zanim
# poprzedni się zakończy — oszczędza minuty runner-ów na niepotrzebnych runach.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 1 — Static Analysis: Pint + PHPStan                                │
  # │  Brak macierzy PHP — narzędzia analizy nie testują kompatybilności       │
  # │  z wersjami. Jedna instancja runner-a wystarczy; działa równolegle        │
  # │  z backend-tests i frontend-*.                                           │
  # └──────────────────────────────────────────────────────────────────────────┘
  static-analysis:
    name: "Static Analysis (Pint + PHPStan)"
    runs-on: ubuntu-24.04

    env:
      COMPOSER_CACHE_DIR: ~/.cache/composer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, fileinfo, curl, intl, json, zip
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cache kluczowany po composer.lock — inwalidacja tylko przy zmianie zależności.
      # restore-keys: fallback gdy nie ma dokładnego hitu (np. nowa gałąź).
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-8.4-
            composer-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Pint — styl kodu (--test)"
        run: vendor/bin/pint --test

      - name: "PHPStan — analiza statyczna (level 8)"
        run: vendor/bin/phpstan analyse --no-progress

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 2 — Backend Tests: Pest                                             │
  # │  Osobny job od static-analysis — oba startują równocześnie.             │
  # │  Macierz PHP testuje kompatybilność z >=8.3 (per composer.json).        │
  # └──────────────────────────────────────────────────────────────────────────┘
  backend-tests:
    name: "Pest (PHP ${{ matrix.php-version }})"
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.4"   # Wersja produkcyjna
          - "8.3"   # Minimalna wersja wg composer.json: >=8.3

    env:
      COMPOSER_CACHE_DIR: ~/.cache/composer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, fileinfo, curl, intl, json, zip, bcmath
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php-version }}-
            composer-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Pest — testy jednostkowe"
        run: vendor/bin/pest

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 3 — Frontend Build: Vite                                           │
  # │  Buduje assety produkcyjne i uploaduje je jako artefakt CI.              │
  # │  Artefakt może być pobrany przez job deploy (zamiast budować drugi raz). │
  # └──────────────────────────────────────────────────────────────────────────┘
  frontend-build:
    name: "Frontend — Vite build"
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: web/app/themes/niepodzielni-theme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cache: 'npm' w setup-node korzysta z package-lock.json jako klucza.
      # Inwalidacja tylko przy zmianie zależności — pierwsze ~30 s oszczędności.
      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/app/themes/niepodzielni-theme/package-lock.json

      # npm ci jest deterministyczne i szybsze niż npm install w CI.
      - name: npm ci
        run: npm ci

      - name: "Vite build (production)"
        run: npm run build

      # Upload artefaktu: deploy job pobiera go zamiast budować po raz drugi.
      # retention-days: 1 minimalizuje zużycie storage na GitHub.
      - name: Upload artefaktu public/build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: web/app/themes/niepodzielni-theme/public/build
          retention-days: 1
          if-no-files-found: error

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 4 — Frontend Unit Tests: Vitest                                    │
  # │  Niezależny od frontend-build — Vitest nie potrzebuje zbudowanych        │
  # │  assetów, więc może startować równocześnie z innymi jobami.              │
  # └──────────────────────────────────────────────────────────────────────────┘
  frontend-unit:
    name: "Frontend — Vitest"
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: web/app/themes/niepodzielni-theme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/app/themes/niepodzielni-theme/package-lock.json

      - name: npm ci
        run: npm ci

      # npm run test → vitest run (bez --watch, tryb CI)
      - name: "Vitest — testy jednostkowe JS"
        run: npm run test

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 5 — E2E Tests: Playwright                                          │
  # │                                                                          │
  # │  Warunek uruchomienia: PLAYWRIGHT_BASE_URL ustawiony jako GitHub         │
  # │  Variable (Settings → Secrets and variables → Variables).               │
  # │  Przykład: https://staging.niepodzielni.pl                              │
  # │                                                                          │
  # │  Testy mockują wszystkie wywołania AJAX (page.route) i uruchamiają się  │
  # │  przeciwko skonfigurowanemu środowisku WP. Bez tego adresu job jest      │
  # │  pomijany — nie blokuje pipeline'u.                                      │
  # │                                                                          │
  # │  Cache przeglądarek (~250 MB): klucz po package-lock.json. Pełny        │
  # │  download (chromium+firefox) tylko przy zmianie Playwright lub          │
  # │  package-lock — w kolejnych runach ~90 s oszczędności.                  │
  # └──────────────────────────────────────────────────────────────────────────┘
  e2e-tests:
    name: "E2E — Playwright (Chromium + Firefox)"
    runs-on: ubuntu-24.04

    # Uruchamia się tylko przy push (nie PR) i tylko gdy staging URL jest skonfigurowany.
    # Przy PR pomijamy E2E — wystarczą unit testy; staging testujemy po merge.
    if: >
      github.event_name == 'push' &&
      vars.PLAYWRIGHT_BASE_URL != ''

    defaults:
      run:
        working-directory: web/app/themes/niepodzielni-theme

    env:
      # Podaj adres staging w GitHub Variables: PLAYWRIGHT_BASE_URL
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      # Stała ścieżka cache — nie zależy od wersji Playwright w binarce
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/app/themes/niepodzielni-theme/package-lock.json

      - name: npm ci
        run: npm ci

      # Cache binarek przeglądarek: Chromium (~170 MB) + Firefox (~80 MB).
      # Klucz inwalidowany tylko przy zmianie package-lock.json (nowa wersja @playwright/test).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # Gdy cache miss: pobierz binarski chromium + firefox + system deps (~2 min)
      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      # Gdy cache hit: binaries z cache, ale system deps (apt) trzeba doinstaować (~15 s)
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - name: "Playwright E2E tests"
        run: npm run test:e2e

      # Uploaduj raporty tylko przy niepowodzeniu — pomaga debugować bez zaśmiecania UI.
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: web/app/themes/niepodzielni-theme/playwright-report/
          retention-days: 7

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  JOB 6 — Cloudflare Worker checks (ai-agent)                            │
  # │  TypeScript compile + wrangler dry-run, żeby PR-y dotykające worker-a   │
  # │  nie przepuściły błędów składniowych ani złamanej config wrangler.toml. │
  # │  Runtime: ~30 s (npm ci --ignore-scripts + tsc + wrangler validate).    │
  # └──────────────────────────────────────────────────────────────────────────┘
  worker-checks:
    name: "Worker — TypeScript + wrangler validate"
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: workers/ai-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workers/ai-agent/package-lock.json

      # --ignore-scripts: nie odpalamy postinstall workera w CI (supply-chain hardening).
      - name: npm ci
        run: npm ci --ignore-scripts

      - name: "TypeScript — tsc --noEmit"
        run: npx tsc --noEmit

      # --dry-run waliduje wrangler.toml (binding, vars, env sections) bez deployu.
      - name: "wrangler — validate config (dry-run)"
        run: npx wrangler deploy --dry-run --outdir /tmp/wrangler-dry

