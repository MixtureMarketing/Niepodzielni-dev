      - name: "Placeholder — deployment niezskonfigurowany"
        run: |
          echo "✓ Static Analysis  — OK"
          echo "✓ Backend Tests    — OK"
          echo "✓ Frontend Build   — OK"
          echo "✓ Frontend Unit    — OK"
          echo ""
          echo "Frontend build artifact pobrany z: frontend-build-${{ github.sha }}"
          echo "Odkomentuj Metodę A (rsync) lub B (Deployer) powyżej."
