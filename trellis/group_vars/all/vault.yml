# ⚠ PLAINTEXT — DOMYŚLNY PLACEHOLDER TRELLIS ⚠
# Wartość poniżej jest tylko placeholderem. Na produkcji vault_mail_password
# JEST nadpisywane wartością z `production/vault.yml` (zaszyfrowanego).
#
# Jeśli hostujesz wszystkie środowiska na tym samym kanale SMTP, ZASZYFRUJ
# ten plik i wstaw realny sekret:
#   `ansible-vault encrypt trellis/group_vars/all/vault.yml`
# (używając tego samego hasła vault co `staging/vault.yml` / `production/vault.yml`).
#
# Procedura: docs/security-runbook.md → "Trellis Vault — szyfrowanie i rotacja".
# Documentation: https://roots.io/trellis/docs/vault/

vault_mail_password: smtp_password

# Variables to accompany `wordpress_env_defaults` in `group_vars/all/helpers.yml`
# Note: These values can be overridden by `vault_wordpress_sites.*.env`
#
# vault_wordpress_env_defaults:
#   my_api_key: 'available to all environments'
