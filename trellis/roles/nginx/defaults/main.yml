---
# A8 SKIPPED — Brotli wymaga niestandardowej kompilacji nginx lub Ubuntu distro packages.
# nginx.org PPA mainline nie dostarcza nginx-module-brotli jako osobnego .deb.
# Decyzja operatora: można przełączyć na Ubuntu nginx (apt:nginx) zamiast nginx.org PPA
# i zainstalować libnginx-mod-http-brotli, ale wymaga to testów z obecną konfiguracją Trellis.
nginx_ppa: "deb http://nginx.org/packages/mainline/ubuntu {{ ansible_distribution_release }} nginx"
nginx_package: nginx
nginx_conf: nginx.conf.j2
nginx_path: /etc/nginx
nginx_worker_connections: 8000
nginx_logs_root: /var/log/nginx
nginx_user: www-data www-data
nginx_fastcgi_buffers: 8 8k
nginx_fastcgi_buffer_size: 8k
nginx_fastcgi_read_timeout: 120s

# Fastcgi cache params
nginx_cache_path: /var/cache/nginx
nginx_cache_key_storage_size: 10m
nginx_cache_size: 250m
nginx_cache_inactive: 1h
nginx_cache_use_stale: error timeout invalid_header http_500
