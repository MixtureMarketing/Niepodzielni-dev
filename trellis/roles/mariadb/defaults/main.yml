mariadb_version: 10.11
mariadb_ppa: "deb https://mirror.rackspace.com/mariadb/repo/{{ mariadb_version }}/ubuntu {{ ansible_distribution_release }} main"

mariadb_client_package: mariadb-client
mariadb_server_package: mariadb-server

mysql_binary_logging_disabled: true
mysql_root_user: root

sites_using_remote_db: "{{ (wordpress_sites | select_sites('env.db_host', 'ne', 'localhost')).keys() | list }}"

mariadb_set_innodb_buffer_pool_size: false
mariadb_innodb_buffer_pool_size: 128M
mariadb_set_innodb_log_file_size: false
mariadb_innodb_log_file_size: 96M

# Audyt wydajności PR [NEEDS-OPS] — B2: InnoDB flush / query cache
mariadb_set_innodb_flush_log_at_trx_commit: false
mariadb_innodb_flush_log_at_trx_commit: 2
mariadb_set_query_cache_type: false
mariadb_query_cache_type: 0

# Audyt wydajności PR [NEEDS-OPS] — B13: Slow query log
mariadb_slow_query_log: false
mariadb_slow_query_log_file: /var/log/mysql/slow.log
mariadb_long_query_time: 2
